services:
  sebastian:
    build: .
    env_file: .env
    volumes:
      - ./data:/app/data
      - ./knowledge:/app/knowledge
      - ./sebastian/agents:/app/sebastian/agents
      - ./sebastian/capabilities:/app/sebastian/capabilities
    depends_on:
      - chromadb
    restart: unless-stopped

  gateway:
    build: .
    command: uvicorn sebastian.gateway.app:app --host 0.0.0.0 --port 8000
    env_file: .env
    ports:
      - "8000:8000"
    depends_on:
      - sebastian
    restart: unless-stopped

  chromadb:
    image: chromadb/chroma:latest
    volumes:
      - ./data/chroma:/chroma/chroma
    restart: unless-stopped

  sandbox:
    build: .
    command: python -m sebastian.sandbox.server
    env_file: .env
    restart: unless-stopped

  # Phase 3: uncomment when voice is ready
